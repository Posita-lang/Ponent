# This template contains all of the possible sections and their default values

# Note that all fields that take a lint level have these possible values:
# * deny - An error will be produced and the check will fail
# * warn - A warning will be produced, but the check will not fail
# * allow - No warning or error will be produced, though in some cases a note
# will be

# The values provided in this template are the default values that will be used
# when any section or field is not specified in your own configuration

# Root options
[graph]
targets = [
    #"x86_64-unknown-linux-musl",
    #{ triple = "wasm32-unknown-unknown", features = ["atomics"] },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─────────────────────────────────────────────────────────────────────────────
# Advisory checks — vulnerability auditing
# ─────────────────────────────────────────────────────────────────────────────
[advisories]
vulnerability = "deny"      # Block known CVEs
unmaintained = "warn"       # Warn on unmaintained crates
yanked = "deny"             # Block yanked versions
notice = "warn"             # Warn on informational notices
ignore = [
    #"RUSTSEC-0000-0000",
    #{ id = "RUSTSEC-0000-0000", reason = "known false positive for our usage" },
]

# ─────────────────────────────────────────────────────────────────────────────
# License checks — only allow permissive, open-source licenses
# ─────────────────────────────────────────────────────────────────────────────
[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "GPL-2.0-only",
    "GPL-3.0-only",
    "GPL-2.0-or-later",
    "GPL-3.0-or-later",
    "AGPL-3.0",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
]
confidence-threshold = 0.8
exceptions = [
    # e.g. { allow = ["Zlib"], crate = "adler32" },
]

#[[licenses.clarify]]
#crate = "ring"
#expression = "MIT AND ISC AND OpenSSL"
#license-files = [
#    { path = "LICENSE", hash = 0xbd0eed23 }
#]

[licenses.private]
ignore = false
registries = []

# ─────────────────────────────────────────────────────────────────────────────
# Ban checks — crate blacklist, duplicate version detection
# ─────────────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"   # Warn if same crate appears at multiple versions
wildcards = "deny"           # Deny wildcard version requirements
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false

# Force rustls over openssl — deny openssl entirely
deny = [
    { crate = "openssl", reason = "prefer rustls for TLS — smaller, safer, no C dependency" },
    { crate = "openssl-sys", reason = "prefer rustls for TLS — smaller, safer, no C dependency" },
    { crate = "openssl-src", reason = "prefer rustls for TLS — smaller, safer, no C dependency" },
]

skip = []
skip-tree = []

# ─────────────────────────────────────────────────────────────────────────────
# Source checks — only allow crates.io and approved git repos
# ─────────────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []